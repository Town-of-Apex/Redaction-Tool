<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Redaction Tool</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>Apex Redact</h1>
    </header>

    <div class="container">
        <div class="card" id="uploadCard">
            <h2 style="font-family: var(--font-dm-serif); font-weight: normal; margin-top:0;">Upload Document</h2>
            <p class="helper-text">Select a text-searchable PDF building permit application. We analyze locally and safely.</p>
            
            <div class="upload-zone" id="dropZone">
                <input type="file" id="fileInput" accept="application/pdf">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--brand-accent)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p>Click or drag and drop a PDF file here</p>
            </div>
            
            <div id="loading">Processing document, finding signatures...</div>
        </div>

        <div class="preview-container" id="previewContainer">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <h2 style="font-family: var(--font-dm-serif); font-weight: normal;">Verify Redactions</h2>
                <span class="box-tag" style="position:relative; background: var(--cool-insight); font-size: 12px;">Draw manually or click to remove</span>
            </div>
            
            <div id="pagesArea"></div>
            
            <div class="controls">
                <button class="btn btn-secondary" onclick="window.location.reload()">Start Over</button>
                <button class="btn" id="redactBtn">
                    Confirm & Download Redacted
                </button>
            </div>
        </div>
    </div>

    <!-- Pass in a minimal local app logic -->
    <script src="/static/app.js"></script>
</body>
</html>
